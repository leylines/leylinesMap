services:
  traefik:
    image: traefik:latest
    container_name: traefik_leylines
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=info@leylines.ch"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
  leylinesmap:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.map-prod.rule=Host(`${LEYLINES_HOST}`)"
      - "traefik.http.routers.map-prod.entrypoints=websecure"
      - "traefik.http.routers.map-prod.tls.certresolver=myresolver"
      - "traefik.http.services.leylines.loadbalancer.server.port=3001"
